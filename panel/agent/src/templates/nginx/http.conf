{% if rate_limit > 0 %}
limit_req_zone $binary_remote_addr zone=rl_{{ domain | replace(from=".", to="_") }}:10m rate={{ rate_limit }}r/s;
{% endif %}

server {
    listen 80;
    listen [::]:80;
    server_name {{ domain }};

    client_max_body_size {{ max_upload_mb }}m;

{% if rate_limit > 0 %}
    limit_req zone=rl_{{ domain | replace(from=".", to="_") }} burst={{ rate_limit * 2 }} nodelay;
    limit_req_status 429;
{% endif %}

{% if runtime == "static" %}
    root {{ root }}/{{ domain }}/public;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }
{% elif runtime == "php" %}
    root {{ root }}/{{ domain }}/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass {{ php_socket }};
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ~ /\.ht {
        deny all;
    }
{% endif %}

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    access_log /var/log/nginx/{{ domain }}.access.log;
    error_log /var/log/nginx/{{ domain }}.error.log;
}
