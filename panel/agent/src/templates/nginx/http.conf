{% if rate_limit > 0 %}
limit_req_zone $binary_remote_addr zone=rl_{{ domain | replace(from=".", to="_") }}:10m rate={{ rate_limit }}r/s;
{% endif %}

server {
{% if bind_ip %}
    listen {{ bind_ip }}:80;
{% else %}
    listen 80;
{% endif %}
    listen [::]:80;
    server_name {{ domain }};

    client_max_body_size {{ max_upload_mb }}m;

{% if rate_limit > 0 %}
    limit_req zone=rl_{{ domain | replace(from=".", to="_") }} burst={{ rate_limit * 2 }} nodelay;
    limit_req_status 429;
{% endif %}

{% if runtime == "static" %}
    root {{ root }}/{{ domain }}/public;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }
{% elif runtime == "php" %}
{% if php_preset == "laravel" %}
    # Laravel — public/ as document root
    root {{ root }}/{{ domain }}/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
{% elif php_preset == "wordpress" %}
    # WordPress
    root {{ root }}/{{ domain }}/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Block xmlrpc
    location = /xmlrpc.php {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block wp-config
    location = /wp-config.php {
        deny all;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
{% elif php_preset == "drupal" %}
    # Drupal
    root {{ root }}/{{ domain }}/public;
    index index.php index.html;

    location / {
        try_files $uri /index.php?$query_string;
    }

    location ~ ^/sites/.*/private/ {
        deny all;
    }

    location ~ ^/sites/.*/files/.*\.php$ {
        deny all;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        access_log off;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
{% elif php_preset == "joomla" %}
    # Joomla
    root {{ root }}/{{ domain }}/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        access_log off;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
{% elif php_preset == "symfony" %}
    # Symfony — public/ as document root
    root {{ root }}/{{ domain }}/public;
    index index.php index.html;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ /\.(env|git) {
        deny all;
    }
{% elif php_preset == "codeigniter" %}
    # CodeIgniter — public/ as document root
    root {{ root }}/{{ domain }}/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?/$request_uri;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
{% elif php_preset == "magento" %}
    # Magento — pub/ as document root
    root {{ root }}/{{ domain }}/pub;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location /static/ {
        expires 30d;
        location ~* \.(ico|jpg|jpeg|png|gif|svg|js|css|swf|eot|ttf|otf|woff|woff2)$ {
            add_header Cache-Control "public";
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            expires +1y;
            access_log off;
        }
    }

    location /media/ {
        expires 30d;
        try_files $uri $uri/ /get.php$is_args$args;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
{% else %}
    # Generic PHP
    root {{ root }}/{{ domain }}/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
{% endif %}

    location ~ \.php$ {
        fastcgi_pass {{ php_socket }};
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }
{% endif %}

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

{% if custom_nginx %}
    # Custom directives
{{ custom_nginx }}
{% endif %}

    access_log /var/log/nginx/{{ domain }}.access.log;
    error_log /var/log/nginx/{{ domain }}.error.log;
}
